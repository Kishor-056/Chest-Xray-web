name: E2E Automation Tests and Reports

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test-and-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: npm install

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Backend & Test Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install backend dependencies (from local_backend.py)
        pip install pillow opencv-python scikit-learn pandas numpy torch torchvision timm fastapi "uvicorn[standard]" python-multipart pyngrok sentence-transformers faiss-cpu grad-cam nest-asyncio
        # Install testing dependencies
        pip install selenium webdriver-manager openpyxl

    - name: Start FastAPI Backend
      run: |
        # Run backend in the background
        python local_backend.py &
        # Give the backend time to download models and initialize
        sleep 120
      env:
        # If your local_backend.py uses environment variables for Ngrok
        NGROK_TOKEN: ${{ secrets.NGROK_TOKEN }}

    - name: Start Vite Frontend
      run: |
        # Run frontend in the background
        npm run dev &
        # Give the frontend time to start
        sleep 15

    - name: Run E2E Tests (Frontend & Selenium)
      run: python e2e_tests.py

    - name: Generate Backend Report
      run: python generate_backend_report.py

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: always() # Ensure reports are uploaded even if tests fail
      with:
        name: Automation-Reports
        path: |
          Test_Report_Passed.xlsx
          Backend_Test_Report.xlsx
